# Blueprint opcional para Render (Web Service)
# En el dashboard de Render también puedes crear el servicio a mano.

services:
  - type: web
    name: bi-habitable-cruce
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      # Contraseña de acceso al BI (Streamlit secrets también sirve)
      - key: BI_PASSWORD
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      # Más RAM en Render: precarga completa + reemplazo por Excel
      - key: BI_LOW_MEMORY
        value: "0"
      - key: BI_MAP_MAX_MARKERS
        value: "5000"
      - key: MALLOC_ARENA_MAX
        value: "2"
